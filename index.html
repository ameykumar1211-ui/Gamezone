        // --- User's Provided Configuration ---
        const userFirebaseConfig = {
            apiKey: "AIzaSyBMB5yyQD_1MAA6dYxLgXy-tCgxTJaCa10",
            authDomain: "gaming-zone-23648.firebaseapp.com",
            projectId: "gaming-zone-23648",
            storageBucket: "gaming-zone-23648.firebasestorage.app",
            messagingSenderId: "1096819067201",
            appId: "1:1096819067201:web:57c08fd4072accce93f9c0",
            measurementId: "G-F0DQ4DVMRN"
        };

        // --- Data Models ---
        const STATION_TYPES = { 
            NORMAL: 'Normal', PREMIUM: 'Premium', SEMI: 'Semi Premium',

        const STATIONS = [
            { id: 'ps1', name: 'PS 1', type: STATION_TYPES.NORMAL, p1: 80, pM: 70, maxP: 4 },
            { id: 'ps2', name: 'PS 2 (Steering Wheel)', type: STATION_TYPES.WHEEL, p1: 150, pM: 150, maxP: 1 },
            { id: 'ps3', name: 'PS 3', type: STATION_TYPES.NORMAL, p1: 80, pM: 70, maxP: 4 },
            { id: 'ps4', name: 'PS 4', type: STATION_TYPES.NORMAL, p1: 80, pM: 70, maxP: 4 },
            { id: 'ps5', name: 'PS 5 (Semi Premium)', type: STATION_TYPES.SEMI, p1: 100, pM: 90, maxP: 4 },
            { id: 'ps6', name: 'PS 6 (Premium)', type: STATION_TYPES.PREMIUM, p1: 120, pM: 110, maxP: 4 },
            { id: 'ps7', name: 'PS 7', type: STATION_TYPES.NORMAL, p1: 80, pM: 70, maxP: 4 },
            { id: 'ps8', name: 'PS 8', type: STATION_TYPES.NORMAL, p1: 80, pM: 70, maxP: 4 },
            { id: 'ps9', name: 'PS 9', type: STATION_TYPES.NORMAL, p1: 80, pM: 70, maxP: 4 },
            { id: 'ps10', name: 'PS 10 (Steering Auto)', type: STATION_TYPES.WHEEL_AUTO, p1: 200, pM: 200, maxP: 1 },
            { id: 'ps11', name: 'PS 11', type: STATION_TYPES.NORMAL, p1: 80, pM: 70, maxP: 4 },
            { id: 'ps12', name: 'PS 12', type: STATION_TYPES.NORMAL, p1: 80, pM: 70, maxP: 4 },
        ];

        let currentUser = null; 
        let allBookings = [];
        let allUsers = [];
        let allAdmins = [];
        let db, auth, appId;
        let unsubscribeBookings = null;
        let unsubscribeUsers = null;
        let unsubscribeAdmins = null;
        let revenueChartInstance = null;
        
        window.adminTab = 'dashboard';
        window.activeAlarms = {}; 
        
        // PWA Global Variables
        window.deferredPrompt = null;
        window.swRegistration = null;

        // VAPID Public Key for Node.js Push Integration
        const PUBLIC_VAPID_KEY = 'BGIg5Qt9He3uHEIDBbige7V1u1sL-fh9MQXhtPlUwcgJ_DHO5ogKAFI_Efsrv4cx1jYDaPP-2yYbFbB1plpRX58';

        // --- Reusable SVG Logo Template ---
        const brandLogoSvg = `
            <svg viewBox="0 0 100 100" class="w-full h-full">
                <path d="M20,10 L45,10 C65,10 75,20 75,32.5 C75,42 68,48 55,50 C70,52 80,60 80,72.5 C80,85 65,90 45,90 L20,90 Z" fill="#ffffff"/>
                <path d="M 50 25 h 10 m -5 -5 v 10" stroke="#FFD700" stroke-width="4" stroke-linecap="round"/>
                <circle cx="55" cy="72" r="3.5" fill="#FFD700"/>
                <circle cx="65" cy="65" r="3.5" fill="#FFD700"/>
                <circle cx="65" cy="79" r="3.5" fill="#FFD700"/>
                <circle cx="75" cy="72" r="3.5" fill="#FFD700"/>
            </svg>
        `;

        // --- Base64 to Uint8Array Converter for Push API ---
        function urlBase64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - base64String.length % 4) % 4);
            const base64 = (base64String + padding).replace(/\-/g, '+').replace(/_/g, '/');
            const rawData = window.atob(base64);
            const outputArray = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; ++i) {
                outputArray[i] = rawData.charCodeAt(i);
            }
            return outputArray;
        }

        // --- PWA & Backend Push Setup ---
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            window.deferredPrompt = e;
            const btn = document.getElementById('install-app-btn');
            if (btn) btn.classList.remove('hidden');
        });

        window.installPWA = async () => {
            if (window.deferredPrompt) {
                window.deferredPrompt.prompt();
                const { outcome } = await window.deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    const btn = document.getElementById('install-app-btn');
                    if(btn) btn.classList.add('hidden');
                }
                window.deferredPrompt = null;
            }
        };

        const initPWA = async () => {
            // Keep Screen Awake natively if supported
            if ('wakeLock' in navigator) {
                try {
                    let wakeLock = await navigator.wakeLock.request('screen');
                    document.addEventListener('visibilitychange', async () => {
                        if (document.visibilityState === 'visible' && wakeLock !== null) {
                            wakeLock = await navigator.wakeLock.request('screen');
                        }
                    });
                } catch (e) { console.log("Wake Lock failed"); }
            }

            // Inject Valid Manifest
            const manifest = {
                name: "Bumblebee Gamezone",
                short_name: "Bumblebee",
                start_url: window.location.href,
                display: "standalone",
                background_color: "#050B14",
                theme_color: "#FFD700",
                icons: [{ src: "https://cdn-icons-png.flaticon.com/512/3233/3233483.png", sizes: "512x512", type: "image/png", purpose: "any maskable" }]
            };
            const manifestLink = document.createElement('link');
            manifestLink.rel = 'manifest';
            manifestLink.href = 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(JSON.stringify(manifest));
            document.head.appendChild(manifestLink);

            // Register Inline Service Worker (Modified for Backend Push Payload)
            if ('serviceWorker' in navigator) {
                const swCode = `
                    self.addEventListener('install', (e) => self.skipWaiting());
                    self.addEventListener('activate', (e) => e.waitUntil(self.clients.claim()));
                    self.addEventListener('fetch', (e) => {}); 
                    
                    // RECEIVE PUSH FROM NODE.JS BACKEND
                    self.addEventListener('push', (e) => {
                        const data = e.data ? e.data.json() : {};
                        const title = data.title || 'Gamezone Alert';
                        const options = {
                            body: data.body || 'Session Ended',
                            icon: 'https://cdn-icons-png.flaticon.com/512/3233/3233483.png',
                            vibrate: [500, 250, 500, 250, 500, 250, 500],
                            requireInteraction: true,
                            data: data.url || '/'
                        };
                        e.waitUntil(self.registration.showNotification(title, options));
                    });

                    // CLICK NOTIFICATION TO OPEN APP
                    self.addEventListener('notificationclick', (e) => {
                        e.notification.close();
                        e.waitUntil(clients.matchAll({ type: 'window' }).then( windowClients => {
                            if(windowClients.length > 0) return windowClients[0].focus();
                            return clients.openWindow(e.notification.data);
                        }));
                    });
                `;
                try {
                    const swBlob = new Blob([swCode], {type: 'application/javascript'});
                    window.swRegistration = await navigator.serviceWorker.register(URL.createObjectURL(swBlob));
                } catch (err) {
                    console.log("Blob SW restricted by browser.");
                }
            }
        };

        // --- Init Firebase ---
        const initFirebase = async () => {
            try {
                const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : userFirebaseConfig;
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, (user) => {
                    if (user && currentUser) {
                        setupRealtimeListener();
                    } else if (!user) {
                        cleanupListeners();
                    }
                });

                const savedUser = localStorage.getItem('bz_user');
                if(savedUser) {
                    currentUser = JSON.parse(savedUser);
                    switchView('app-screen');
                    if(auth.currentUser) setupRealtimeListener();
                }
            } catch (error) {
                console.error("Firebase init error:", error);
            }
        };

        const cleanupListeners = () => {
            if (unsubscribeBookings) unsubscribeBookings();
            if (unsubscribeUsers) unsubscribeUsers();
            if (unsubscribeAdmins) unsubscribeAdmins();
        }

        const setupRealtimeListener = () => {
            if (!auth.currentUser) return; 
            cleanupListeners();
            
            const bookingsRef = collection(db, 'artifacts', appId, 'public', 'data', 'bookings');
            unsubscribeBookings = onSnapshot(bookingsRef, (snapshot) => {
                allBookings = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderDashboard();
            });

            if (currentUser.role === 'admin' || currentUser.role === 'master_admin') {
                const usersRef = collection(db, 'artifacts', appId, 'public', 'data', 'app_users');
                unsubscribeUsers = onSnapshot(usersRef, (snapshot) => {
                    allUsers = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    if (window.adminTab === 'customers') renderDashboard();
                });
            }

            if (currentUser.role === 'master_admin') {
                const adminRef = collection(db, 'artifacts', appId, 'public', 'data', 'admin_users');
                unsubscribeAdmins = onSnapshot(adminRef, (snapshot) => {
                    allAdmins = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    if (window.adminTab === 'settings') renderDashboard();
                });
                seedDefaultAdmins();
            }
        };

        const seedDefaultAdmins = async () => {
             const defaultAdmins = [ {u: 'Rehan', p: 'Team1'}, {u: 'Akram', p: 'Team2'}, {u: 'Noor', p: 'Team3'} ];
             for(let a of defaultAdmins) {
                  const r = doc(db, 'artifacts', appId, 'public', 'data', 'admin_users', a.u.toLowerCase());
                  const s = await getDoc(r);
                  if(!s.exists()) { await setDoc(r, { username: a.u, password: a.p, createdAt: Date.now(), pushSubscription: null }); }
             }
        }

        // --- System Push Notifications & Audio Alarms ---
        window.requestAppPermissions = async () => {
            playSingleBeep(0.01); // Unlock audio context

            if ("Notification" in window) {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    // Subscribe to Push Manager for Node.js Backend
                    if (window.swRegistration) {
                        try {
                            const subscription = await window.swRegistration.pushManager.subscribe({
                                userVisibleOnly: true,
                                applicationServerKey: urlBase64ToUint8Array(PUBLIC_VAPID_KEY)
                            });
                            
                            // Save subscription to Firebase so Node.js can use it
                            if(currentUser && (currentUser.role === 'admin' || currentUser.role === 'master_admin')) {
                                const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'admin_users', currentUser.username.toLowerCase());
                                await updateDoc(userRef, { pushSubscription: JSON.stringify(subscription) });
                                console.log("Push Subscription saved to Database!");
                            }
                        } catch (err) {
                            console.error('Failed to subscribe the user: ', err);
                        }
                    }
                    renderDashboard(); // Re-render to hide banner
                } else {
                    alert("Notifications Denied! Please enable them in browser settings.");
                }
            }
        };

        const playSingleBeep = (vol = 0.5) => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                osc.type = 'square'; 
                osc.frequency.setValueAtTime(850, ctx.currentTime);
                gainNode.gain.setValueAtTime(vol, ctx.currentTime);
                osc.connect(gainNode);
                gainNode.connect(ctx.destination);
                osc.start();
                setTimeout(() => { osc.stop(); ctx.close(); }, 500); 
            } catch(e) {}
        };

        window.startStrongAlarm = (id) => {
            if(window.activeAlarms[id]) return;
            playSingleBeep(0.5); 
            window.activeAlarms[id] = setInterval(() => playSingleBeep(0.5), 1200); 
        };

        window.stopStrongAlarm = (id) => {
            if(window.activeAlarms[id]) {
                clearInterval(window.activeAlarms[id]);
                delete window.activeAlarms[id];
            }
        };

        // --- Utilities ---
        const formatTimeLeft = (ms) => {
            if (ms <= 0) return "00:00:00";
            const totalSeconds = Math.floor(ms / 1000);
            const h = Math.floor(totalSeconds / 3600).toString().padStart(2, '0');
            const m = Math.floor((totalSeconds % 3600) / 60).toString().padStart(2, '0');
            const s = (totalSeconds % 60).toString().padStart(2, '0');
            return `${h}:${m}:${s}`;
        };

        const formatClockTime = (ts) => new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const formatDate = (ts) => new Date(ts).toLocaleDateString([], { year: 'numeric', month: 'short', day: 'numeric' });

        const calculatePrice = (station, players, durationMins) => {
            let hourlyRate = (station.type === STATION_TYPES.WHEEL || station.type === STATION_TYPES.WHEEL_AUTO) 
                ? station.p1 : (players === 1 ? station.p1 : station.pM * players);
            return Math.round(hourlyRate * (durationMins / 60));
        };

        const getStationBookings = (stationId) => {
            const now = Date.now();
            return allBookings
                .filter(b => b.stationId === stationId && b.endTime > now)
                .sort((a, b) => a.startTime - b.startTime);
        };

        const showError = (elementId, message) => {
            const el = document.getElementById(elementId);
            if(!el) return;
            el.innerText = message;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 5000);
        };

        // --- Notifications & Safety Timer UI ---
        window.showEndToast = (stationId, username, bookingId, isAutoExtended = false) => {
            const st = STATIONS.find(s=>s.id === stationId);
            const toastId = 'toast-' + bookingId;
            if(document.getElementById(toastId)) return;

            window.startStrongAlarm(toastId);

            // Note: The OS Push Notification is now triggered by the NODE.JS BACKEND.
            // This function only handles the on-screen toast popup and audio alarm.
            const notifTitle = `🚨 ${st.name} ${isAutoExtended ? 'Auto-Extended!' : 'Time\'s Up!'}`;

            const toast = document.createElement('div');
            toast.id = toastId;
            toast.className = `bg-white border-l-4 ${isAutoExtended ? 'border-red-600' : 'border-[#FFD700]'} shadow-2xl p-4 rounded-r-lg flex items-start gap-3 animate-in slide-in-from-right-full duration-300 w-80 pointer-events-auto mb-3`;
            toast.innerHTML = `
                <div class="${isAutoExtended ? 'bg-red-100 text-red-600' : 'bg-yellow-100 text-yellow-600'} p-2 rounded-full shrink-0 animate-pulse">
                    <i data-lucide="${isAutoExtended ? 'alert-octagon' : 'bell-ring'}" class="w-6 h-6"></i>
                </div>
                <div class="flex-grow">
                    <h4 class="font-bold text-slate-800 leading-tight mb-1">${notifTitle}</h4>
                    <p class="text-xs text-slate-500 font-medium mb-3">User: <strong class="text-slate-700">${username}</strong> ${isAutoExtended ? '<span class="text-red-600 font-black ml-1">(+30m)</span>' : ''}</p>
                    <div class="flex flex-col gap-2">
                        <button onclick="window.stopStrongAlarm('${toastId}'); openStopConfirm('${stationId}', '${bookingId}'); document.getElementById('${toastId}').remove();" class="text-xs bg-red-600 text-white px-3 py-2.5 rounded shadow-md font-black hover:bg-red-700 transition w-full text-center tracking-widest uppercase flex justify-center items-center gap-2"><i data-lucide="square" class="w-3 h-3"></i> Stop Session</button>
                        <button onclick="window.stopStrongAlarm('${toastId}'); openInvoiceModal('${bookingId}'); document.getElementById('${toastId}').remove();" class="text-xs bg-slate-800 text-[#FFD700] px-3 py-2.5 rounded shadow-md font-bold hover:bg-slate-900 transition w-full text-center tracking-widest uppercase flex justify-center items-center gap-2"><i data-lucide="receipt" class="w-3 h-3"></i> View Receipt</button>
                    </div>
                </div>
                <button onclick="window.stopStrongAlarm('${toastId}'); document.getElementById('${toastId}').remove()" class="text-slate-400 hover:text-slate-600 bg-slate-50 p-1 rounded-full"><i data-lucide="x" class="w-5 h-5"></i></button>
            `;
            document.getElementById('toast-container').appendChild(toast);
            lucide.createIcons();
            
            setTimeout(() => { 
                window.stopStrongAlarm(toastId);
                if(document.getElementById(toastId)) document.getElementById(toastId).remove(); 
            }, 120000); 
        };

        // --- Navigation ---
        window.switchView = (viewId) => {
            ['login-screen', 'register-screen', 'app-screen'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            document.getElementById(viewId).classList.remove('hidden');
            
            if(viewId === 'app-screen' && currentUser) {
                let roleDisplay = currentUser.role === 'master_admin' ? 'Master Admin' : currentUser.role;
                document.getElementById('nav-username').innerText = `${currentUser.username} (${roleDisplay})`;
                document.getElementById('nav-logo').innerHTML = brandLogoSvg;
                window.adminTab = 'dashboard';
                renderDashboard();
            }
        };

        window.switchAdminTab = (tabId) => {
            window.adminTab = tabId;
            if (revenueChartInstance && tabId !== 'dashboard') {
                revenueChartInstance.destroy();
                revenueChartInstance = null;
            }
            renderDashboard();
        }

        // --- Authentication Actions ---
        window.handleLogin = async (e) => {
            e.preventDefault();
            if (!auth.currentUser) return showError('login-error', "Connecting to secure server... Please wait.");
            
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value.trim();
            const btn = document.getElementById('login-btn');
            
            if (!username || !password) return showError('login-error', "Please fill all fields");

            btn.innerText = "Authenticating...";
            btn.disabled = true;

            try {
                if (username === 'Admin369' && password === 'Iamadmin') {
                    currentUser = { username, role: 'master_admin' };
                } else {
                    const safeUsernameId = username.toLowerCase();
                    const adminRef = doc(db, 'artifacts', appId, 'public', 'data', 'admin_users', safeUsernameId);
                    const adminSnap = await getDoc(adminRef);
                    
                    if (adminSnap.exists() && adminSnap.data().password === password) {
                        currentUser = { username: adminSnap.data().username, role: 'admin' };
                    } else {
                        const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'app_users', safeUsernameId);
                        const userSnap = await getDoc(userRef);

                        if (!userSnap.exists()) throw new Error("Account not found. Please register first.");
                        if (userSnap.data().password !== password) throw new Error("Incorrect password. Please try again.");
                        currentUser = { username: userSnap.data().username, role: 'user', phone: userSnap.data().phone };
                    }
                }
                
                localStorage.setItem('bz_user', JSON.stringify(currentUser));
                switchView('app-screen');
                setupRealtimeListener();
            } catch (err) {
                showError('login-error', err.message);
            } finally {
                btn.innerText = "LOGIN";
                btn.disabled = false;
            }
        };

        window.handleRegister = async (e) => {
            e.preventDefault();
            if (!auth.currentUser) return showError('reg-error', "Connecting to secure server... Please wait.");
            
            const username = document.getElementById('reg-username').value.trim();
            const phone = document.getElementById('reg-phone').value.trim();
            const password = document.getElementById('reg-password').value.trim();
            const btn = document.getElementById('reg-btn');

            if (!username || !phone || !password) return showError('reg-error', "Please fill all fields");

            btn.innerText = "Creating account...";
            btn.disabled = true;

            try {
                const safeUsernameId = username.toLowerCase();
                const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'app_users', safeUsernameId);
                const userSnap = await getDoc(userRef);

                if (userSnap.exists()) throw new Error("Username already taken. Please choose another.");

                await setDoc(userRef, { username, password, phone, createdAt: Date.now() });

                currentUser = { username, role: 'user', phone };
                localStorage.setItem('bz_user', JSON.stringify(currentUser));
                switchView('app-screen');
                setupRealtimeListener();
            } catch (err) {
                showError('reg-error', err.message);
            } finally {
                btn.innerText = "SIGN UP";
                btn.disabled = false;
            }
        };

        window.logout = () => {
            currentUser = null;
            localStorage.removeItem('bz_user');
            cleanupListeners();
            Object.keys(window.activeAlarms).forEach(id => window.stopStrongAlarm(id));
            if (revenueChartInstance) {
                revenueChartInstance.destroy();
                revenueChartInstance = null;
            }
            switchView('login-screen');
            document.getElementById('login-username').value = '';
            document.getElementById('login-password').value = '';
        };

        // --- Master Admin Actions ---
        window.clearAllData = async () => {
            if (!currentUser || currentUser.role !== 'master_admin') return;
            
            const pass = prompt("WARNING: This will delete ALL revenue and booking history forever. Type 'CONFIRM' exactly to proceed.");
            if (pass !== 'CONFIRM') return;

            document.getElementById('dashboard-content').innerHTML = `
                 <div class="flex flex-col items-center justify-center py-20">
                    <div class="w-16 h-16 border-4 border-slate-200 border-t-red-600 rounded-full animate-spin mb-4"></div>
                    <h3 class="font-bold text-slate-700">Wiping database...</h3>
                 </div>
            `;

            try {
                const deletePromises = allBookings.map(b => {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'bookings', b.id);
                    return deleteDoc(docRef);
                });
                
                await Promise.all(deletePromises);
                allBookings = []; 
                alert("All bookings and revenue data wiped successfully.");
                renderDashboard();
            } catch(e) {
                alert("Failed to clear data.");
                renderDashboard();
            }
        };

        window.addNewAdmin = async (e) => {
            e.preventDefault();
            if (!currentUser || currentUser.role !== 'master_admin') return;
            
            const u = document.getElementById('new-admin-username').value.trim();
            const p = document.getElementById('new-admin-password').value.trim();
            const btn = document.getElementById('add-admin-btn');
            
            if (!u || !p) return;
            btn.innerText = "Adding...";
            btn.disabled = true;
            
            try {
                const ref = doc(db, 'artifacts', appId, 'public', 'data', 'admin_users', u.toLowerCase());
                await setDoc(ref, { username: u, password: p, createdAt: Date.now(), pushSubscription: null });
                document.getElementById('new-admin-username').value = '';
                document.getElementById('new-admin-password').value = '';
            } catch (err) { alert("Error adding admin."); } 
            finally { btn.innerText = "Add Admin"; btn.disabled = false; }
        };

        window.deleteAdmin = async (adminId) => {
            if (!currentUser || currentUser.role !== 'master_admin') return;
            if (!confirm("Are you sure you want to revoke this admin's access?")) return;

                const isSequential = /^(0123456789|1234567890)/.test(txnId);
                const isRepeated = /^(.)\1{11}$/.test(txnId);
                const validUpiStart = /^[4567]/.test(txnId);

            try {

                    await updateDoc(docRef, { isPaused: true, pausedAt: Date.now() });

                                    </div>
                                    ${station.maxP > 1 ? `
                                    <div class="flex justify-between pt-2 mt-2 border-t border-slate-200/50">
                                        <span class="flex items-center gap-1"><i data-lucide="users" class="w-4 h-4 text-slate-400"></i> Multi:</span>
                                        <span class="font-bold text-slate-800">₹${station.pM}/hr pp</span>
                                    </div>` : ''}
                                </div>
                                <div class="flex items-center justify-center p-2 rounded text-xs font-bold ${isAvailable ? 'bg-green-50 text-green-700' : 'bg-orange-50 text-orange-700'}">
                                    ${isAvailable ? '<i data-lucide="check-circle" class="w-4 h-4 mr-1"></i> Available Now' : `<i data-lucide="clock" class="w-4 h-4 mr-1"></i> Available at ${formatClockTime(availableAt)}`}
                                </div>
                            </div>
                            <div class="p-4 bg-white border-t border-slate-100">
                                <button onclick="openBookingModal('${station.id}')" class="w-full bg-[#111827] text-white font-bold py-2.5 rounded-lg hover:bg-slate-800 shadow-sm transition flex justify-center items-center gap-2">
                                    ${isAvailable ? 'Book Station <i data-lucide="arrow-right" class="w-4 h-4"></i>' : 'Join Queue <i data-lucide="list-plus" class="w-4 h-4"></i>'}
                                </button>
                            </div>
                        </div>
                    `;
                });
                html += `</div>`;
                container.innerHTML = html;
                lucide.createIcons();
            }
        };

        // --- Core Application Loop (Timer & Fallback Auto-Extend) ---
        setInterval(() => {
            if (!currentUser) return;
            const now = Date.now();
            let needsRefresh = false;
            
            document.querySelectorAll('.timer-element').forEach(el => {
                const endTime = parseInt(el.getAttribute('data-timer-end'));
                const isPaused = el.getAttribute('data-is-paused') === 'true';
                const pausedAt = parseInt(el.getAttribute('data-paused-at'));
                const status = el.getAttribute('data-status');
                
                if (isPaused) {
                    el.innerText = formatTimeLeft(endTime - pausedAt);
                    el.classList.add('text-yellow-600', 'animate-pulse');
                    el.classList.remove('text-slate-800', 'text-red-600');
                } else {
                    el.classList.remove('text-yellow-600', 'animate-pulse');
                    if (now >= endTime) {
                        el.innerText = "00:00:00";
                    } else {
                        el.innerText = formatTimeLeft(endTime - now);
                    }
                }
            });

            // Fallback Auto-Extend Database Engine 
            // (If the Node.js backend isn't running, this will at least keep the database accurate)
            if (currentUser.role === 'admin' || currentUser.role === 'master_admin') {
                allBookings.forEach(b => {
                    if (!b.isPaused && !b.sessionEnded && !b.invoiced && b.endTime <= now) {
                        
                        const oldEndTime = b.endTime;
                        const extensionMins = 30;
                        const extensionMs = extensionMins * 60 * 1000;
                        
                        b.endTime = oldEndTime + extensionMs; 
                        b.isOvertime = true;

                        const newDuration = b.durationMins + extensionMins;
                        const station = STATIONS.find(s => s.id === b.stationId);
                        const newCost = calculatePrice(station, b.players, newDuration);
                        
                        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'bookings', b.id);
                        updateDoc(docRef, { endTime: b.endTime, durationMins: newDuration, cost: newCost, isOvertime: true }).catch(e=>console.log(e));
                        
                        const queue = getStationBookings(b.stationId).filter(q => q.id !== b.id && q.startTime >= oldEndTime);
                        for(const qb of queue) {
                            const qRef = doc(db, 'artifacts', appId, 'public', 'data', 'bookings', qb.id);
                            updateDoc(qRef, { startTime: qb.startTime + extensionMs, endTime: qb.endTime + extensionMs }).catch(e=>console.log(e));
                        }

                        // Trigger the UI Pop-up
                        showEndToast(b.stationId, b.username, b.id, true); 
                        needsRefresh = true;
                    }
                });
            }

            if (needsRefresh) renderDashboard();
        }, 1000);

        window.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.logo-container').forEach(el => { el.innerHTML = brandLogoSvg; });
            lucide.createIcons();
        });

        // Initialize Firebase and PWA setup on load
        window.onload = () => {
            initFirebase();
            initPWA();
        };
    </script>
</head>
